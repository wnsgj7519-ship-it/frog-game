<!DOCTYPE html>
<html lang="ko">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="frog_icon.png">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개구리 게임</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(#d8fbe4, #a5f3fc);
      text-align: center;
    }
    .wrap {
      max-width: 430px;
      margin: 0 auto;
      padding: 12px;
    }
    h2 {
      margin: 10px 0 8px;
      color: #184d33;
    }
    .hud {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .pill {
      flex: 1;
      background: rgba(255,255,255,0.85);
      border-radius: 999px;
      padding: 8px 10px;
      font-weight: bold;
      color: #184d33;
    }
    button {
      padding: 14px 28px;
      font-size: 20px;
      background: #2f9e44;
      color: white;
      border: none;
      border-radius: 14px;
      margin-bottom: 12px;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 20px;
      background: linear-gradient(#c7f9cc 0 28%, #74c0fc 28% 100%);
      touch-action: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>🐸 개구리 파리 잡기</h2>

    <div class="hud">
      <div class="pill">점수: <span id="score">0</span></div>
      <div class="pill">시간: <span id="time">60</span></div>
      <div class="pill">최고: <span id="best">0</span></div>
    </div>

    <button id="startBtn">게임 시작</button>
    <canvas id="game" width="400" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");
    const startBtn = document.getElementById("startBtn");

    let score = 0;
    let bestScore = Number(localStorage.getItem("frog_best") || 0);
    let timeLeft = 60;
    let running = false;
    let lastTime = 0;
    let spawnTimer = 0;
    let animationId = null;

    const bugs = [];
    bestEl.textContent = bestScore;

    const frog = {
      x: 200,
      y: 535,
      r: 30,
      tongue: {
        active: false,
        x: 200,
        y: 535,
        tx: 200,
        ty: 535,
        returning: false,
        speed: 900
      }
    };

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();

    function beep(freq, dur = 0.08, type = "square", volume = 0.03) {
      if (audioCtx.state === "suspended") audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      osc.start(now);
      osc.stop(now + dur);
    }

    function soundStart() {
      beep(440, 0.06, "triangle", 0.03);
      setTimeout(() => beep(660, 0.08, "triangle", 0.03), 80);
    }

    function soundHit() {
      beep(700, 0.05, "square", 0.03);
      setTimeout(() => beep(900, 0.06, "triangle", 0.025), 40);
    }

    function soundMiss() {
      beep(220, 0.05, "sawtooth", 0.02);
    }

    function resetGame() {
      score = 0;
      timeLeft = 60;
      spawnTimer = 0;
      bugs.length = 0;
      frog.x = 200;
      frog.tongue.active = false;
      frog.tongue.returning = false;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;

      for (let i = 0; i < 6; i++) {
        spawnBug(true);
      }
    }

    function spawnBug(initial = false) {
      const side = Math.random() < 0.5 ? -30 : 430;
      const speed = 60 + Math.random() * 70;

      bugs.push({
        x: initial ? 20 + Math.random() * 360 : side,
        y: 120 + Math.random() * 240,
        r: 10 + Math.random() * 4,
        vx: initial ? (Math.random() < 0.5 ? -1 : 1) * speed : (side < 0 ? speed : -speed),
        vy: (Math.random() - 0.5) * 20,
        wave: Math.random() * Math.PI * 2
      });
    }

    function startGame() {
      resetGame();
      running = true;
      startBtn.disabled = true;
      startBtn.textContent = "게임 중";
      soundStart();

      if (animationId) cancelAnimationFrame(animationId);
      lastTime = performance.now();
      animationId = requestAnimationFrame(loop);
    }

    function endGame() {
      running = false;
      startBtn.disabled = false;
      startBtn.textContent = "다시 시작";

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("frog_best", String(bestScore));
        bestEl.textContent = bestScore;
      }
    }

    function update(dt) {
      if (!running) return;

      timeLeft -= dt;
      if (timeLeft <= 0) {
        timeLeft = 0;
        timeEl.textContent = "0";
        endGame();
        return;
      }
      timeEl.textContent = Math.ceil(timeLeft);

      spawnTimer += dt;
      if (spawnTimer >= 0.9) {
        spawnTimer = 0;
        spawnBug(false);
      }

      for (let i = bugs.length - 1; i >= 0; i--) {
        const b = bugs[i];
        b.wave += dt * 8;
        b.x += b.vx * dt;
        b.y += b.vy * dt + Math.sin(b.wave) * 18 * dt;

        if (b.y < 100 || b.y > 380) b.vy *= -1;
        if (b.x < -50 || b.x > 450) bugs.splice(i, 1);
      }

      const t = frog.tongue;
      if (t.active) {
        if (!t.returning) {
          const dx = t.tx - t.x;
          const dy = t.ty - t.y;
          const d = Math.hypot(dx, dy);

          if (d < 10) {
            t.returning = true;
            soundMiss();
          } else {
            t.x += (dx / d) * t.speed * dt;
            t.y += (dy / d) * t.speed * dt;
          }

          for (let i = bugs.length - 1; i >= 0; i--) {
            const b = bugs[i];
            if (Math.hypot(t.x - b.x, t.y - b.y) < b.r + 8) {
              bugs.splice(i, 1);
              score += 1;
              scoreEl.textContent = score;
              soundHit();
              t.returning = true;
              break;
            }
          }

          const len = Math.hypot(t.x - frog.x, t.y - (frog.y - 8));
          if (len > 220) {
            t.returning = true;
            soundMiss();
          }
        } else {
          const dx = frog.x - t.x;
          const dy = (frog.y - 8) - t.y;
          const d = Math.hypot(dx, dy);

          if (d < 10) {
            t.active = false;
            t.returning = false;
            t.x = frog.x;
            t.y = frog.y - 8;
          } else {
            t.x += (dx / d) * 1000 * dt;
            t.y += (dy / d) * 1000 * dt;
          }
        }
      }
    }

    function drawCloud(x, y) {
      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, Math.PI * 2);
      ctx.arc(x + 18, y - 10, 22, 0, Math.PI * 2);
      ctx.arc(x + 38, y, 18, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBackground() {
      ctx.clearRect(0, 0, 400, 600);

      drawCloud(40, 80);
      drawCloud(140, 100);
      drawCloud(260, 85);

      ctx.fillStyle = "rgba(255,255,255,0.12)";
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.ellipse(40 + i * 80, 190, 30, 6, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBug(b) {
      ctx.save();
      ctx.translate(b.x, b.y);

      ctx.strokeStyle = "rgba(255,255,255,0.7)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(-5, -4, 10, 5, 0.6, 0, Math.PI * 2);
      ctx.ellipse(5, -4, 10, 5, -0.6, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "black";
      ctx.beginPath();
      ctx.arc(0, 0, b.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawFrog() {
      ctx.fillStyle = "#69db7c";
      ctx.beginPath();
      ctx.ellipse(frog.x, frog.y + 40, 64, 20, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#2f9e44";
      ctx.beginPath();
      ctx.arc(frog.x, frog.y, frog.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(frog.x - 14, frog.y - 18, 10, 0, Math.PI * 2);
      ctx.arc(frog.x + 14, frog.y - 18, 10, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(frog.x - 14, frog.y - 18, 5, 0, Math.PI * 2);
      ctx.arc(frog.x + 14, frog.y - 18, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "black";
      ctx.beginPath();
      ctx.arc(frog.x - 14, frog.y - 18, 2.5, 0, Math.PI * 2);
      ctx.arc(frog.x + 14, frog.y - 18, 2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#173b2a";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(frog.x, frog.y + 6, 10, 0.2, Math.PI - 0.2);
      ctx.stroke();

      const t = frog.tongue;
      if (t.active) {
        ctx.strokeStyle = "#ff6b6b";
        ctx.lineWidth = 5;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(frog.x, frog.y - 8);
        ctx.lineTo(t.x, t.y);
        ctx.stroke();

        ctx.fillStyle = "#fa5252";
        ctx.beginPath();
        ctx.arc(t.x, t.y, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawOverlay() {
      if (running) return;

      ctx.fillStyle = "rgba(0,0,0,0.14)";
      ctx.fillRect(0, 0, 400, 600);

      ctx.fillStyle = "white";
      ctx.fillRect(70, 210, 260, 110);

      ctx.fillStyle = "#184d33";
      ctx.font = "bold 24px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("시작 버튼을 누르세요", 200, 255);
      ctx.font = "16px sans-serif";
      ctx.fillText("벌레를 눌러 잡으면 점수 획득", 200, 287);
      ctx.textAlign = "start";
    }

    function draw() {
      drawBackground();
      for (const b of bugs) drawBug(b);
      drawFrog();
      drawOverlay();
    }

    function loop(ts) {
      const dt = Math.min(0.033, (ts - lastTime) / 1000);
      lastTime = ts;

      update(dt);
      draw();

      if (running) {
        animationId = requestAnimationFrame(loop);
      } else {
        draw();
      }
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    canvas.addEventListener("click", (e) => {
      if (!running) return;
      if (audioCtx.state === "suspended") audioCtx.resume();

      const p = getPos(e);
      frog.tongue.active = true;
      frog.tongue.returning = false;
      frog.tongue.x = frog.x;
      frog.tongue.y = frog.y - 8;
      frog.tongue.tx = p.x;
      frog.tongue.ty = p.y;
    });

    startBtn.addEventListener("click", () => {
      if (audioCtx.state === "suspended") audioCtx.resume();
      startGame();
    });

    draw();
  </script>
</body>
</html>
