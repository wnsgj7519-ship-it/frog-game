<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2f9e44" />
  <meta name="description" content="개구리가 떠다니는 파리를 잡아먹는 모바일 웹앱 게임" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <title>개구리 파리 잡기</title>
  <style>
    :root {
      --bg1: #b8f2e6; --bg2: #aed9e0; --water: #74c0fc; --frog: #2f9e44;
      --tongue: #ff6b6b; --text: #173b2a; --panel: rgba(255,255,255,0.8);
      --btn: #2b8a3e; --btn2: #1f6f31;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Apple SD Gothic Neo, Malgun Gothic, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2)); color: var(--text);
      min-height: 100vh; display: grid; place-items: center; overflow: hidden;
    }
    .wrap { width: min(100vw, 980px); padding: 10px; }
    .hud { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; font-weight: 700; }
    .pill { background: var(--panel); border-radius: 999px; padding: 8px 12px; box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    canvas {
      width: 100%; height: auto; display: block; border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0,0,0,.18);
      background: linear-gradient(180deg, #d0f4de 0%, #c7f9cc 30%, #8ce99a 31%, #74c0fc 32%, #4dabf7 100%);
      touch-action: none;
    }
    .controls {
      margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    }
    button.ctrl {
      border: 0; border-radius: 18px; padding: 16px 10px; color: white; font-weight: 800;
      font-size: 18px; background: linear-gradient(180deg, var(--btn), var(--btn2));
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }
    .hint {
      margin-top: 10px; background: var(--panel); border-radius: 16px; padding: 10px 14px;
      line-height: 1.5; box-shadow: 0 4px 20px rgba(0,0,0,.08); font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div class="pill">점수: <span id="score">0</span></div>
      <div class="pill">남은 시간: <span id="time">60</span>초</div>
      <div class="pill">최고 점수: <span id="best">0</span></div>
    </div>
    <canvas id="game" width="960" height="600" aria-label="개구리 파리 잡기"></canvas>
    <div class="controls">
      <button class="ctrl" id="leftBtn">⬅️ 왼쪽</button>
      <button class="ctrl" id="shootBtn">👅 혀 발사</button>
      <button class="ctrl" id="rightBtn">오른쪽 ➡️</button>
    </div>
    <div class="hint">모바일 웹앱 버전. 버튼으로 이동하고, 화면을 터치하면 그 방향으로 혀를 쏴요. 게임 종료 후 다시 시작은 R 또는 새로고침.</div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
    }

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const shootBtn = document.getElementById("shootBtn");

    const W = canvas.width, H = canvas.height, WATER_Y = 190;
    const keys = new Set();
    const pointer = { x: W / 2, y: H / 2, active: false };
    let bestScore = Number(localStorage.getItem("frogFlyBest") || 0);
    bestEl.textContent = bestScore;

    const state = { score:0, timeLeft:60, over:false, startedAt:0, spawnTimer:0, spawnEvery:900, difficultyTimer:0, particles:[], flies:[], frog:null };

    function resetGame() {
      state.score=0; state.timeLeft=60; state.over=false; state.startedAt=performance.now();
      state.spawnTimer=0; state.spawnEvery=900; state.difficultyTimer=0; state.particles=[]; state.flies=[];
      state.frog={ x:W/2, y:H-105, radius:46, speed:430, tongue:{ active:false, x:0, y:0, vx:0, vy:0, len:0, maxLen:260, returning:false } };
      for(let i=0;i<6;i++) spawnFly(true);
      updateHUD();
    }
    function updateHUD(){ scoreEl.textContent=state.score; timeEl.textContent=Math.max(0, Math.ceil(state.timeLeft)); bestEl.textContent=bestScore; }
    function rand(min,max){ return Math.random()*(max-min)+min; }
    function spawnFly(initial=false){
      const y=rand(WATER_Y+40,H-260), side=Math.random()<0.5?-1:1, speed=rand(40,95)+(60-state.timeLeft)*0.7;
      state.flies.push({ x:side<0?-30:W+30, y, vx:side*speed, vy:rand(-30,30), bob:rand(0,Math.PI*2), size:rand(12,18), worth:1+(Math.random()<0.15?1:0) });
      if(!initial && Math.random()<0.25){
        state.flies.push({ x:Math.random()<0.5?-30:W+30, y:rand(WATER_Y+30,H-250), vx:(Math.random()<0.5?-1:1)*rand(90,140), vy:rand(-40,40), bob:rand(0,Math.PI*2), size:rand(10,14), worth:2 });
      }
    }
    function shootTongue(targetX,targetY){
      const t=state.frog.tongue; if(state.over||t.active) return;
      const ox=state.frog.x, oy=state.frog.y-10; let dx=targetX-ox, dy=targetY-oy; const dist=Math.hypot(dx,dy)||1; dx/=dist; dy/=dist;
      t.active=true; t.returning=false; t.x=ox; t.y=oy; t.vx=dx*920; t.vy=dy*920; t.len=0; t.maxLen=290;
    }
    function addBurst(x,y,count,type="catch"){ for(let i=0;i<count;i++) state.particles.push({ x,y,vx:rand(-120,120),vy:rand(-120,120),life:rand(.35,.65),age:0,type }); }
    function nearestFly(){ let best=null,bestD=Infinity; for(const fly of state.flies){ const d=Math.hypot(fly.x-state.frog.x, fly.y-state.frog.y); if(d<bestD){ bestD=d; best=fly; } } return best; }

    function update(dt){
      if(state.over) return;
      state.timeLeft -= dt;
      if(state.timeLeft <= 0){
        state.timeLeft=0; state.over=true;
        if(state.score > bestScore){ bestScore=state.score; localStorage.setItem("frogFlyBest", String(bestScore)); }
        updateHUD(); return;
      }
      const frog=state.frog;
      let dir=0; if(keys.has("ArrowLeft")) dir-=1; if(keys.has("ArrowRight")) dir+=1;
      frog.x += dir*frog.speed*dt; frog.x=Math.max(70,Math.min(W-70,frog.x));

      state.spawnTimer += dt*1000; state.difficultyTimer += dt*1000;
      if(state.spawnTimer >= state.spawnEvery){ state.spawnTimer=0; spawnFly(); }
      if(state.difficultyTimer >= 5000){ state.difficultyTimer=0; state.spawnEvery=Math.max(350, state.spawnEvery-55); }

      for(let i=state.flies.length-1;i>=0;i--){
        const fly=state.flies[i];
        fly.bob += dt*7; fly.x += fly.vx*dt; fly.y += fly.vy*dt + Math.sin(fly.bob)*18*dt;
        if(fly.y < WATER_Y+25 || fly.y > H-200) fly.vy *= -1;
        if(fly.x < -70 || fly.x > W+70) state.flies.splice(i,1);
      }

      const t=frog.tongue;
      if(t.active){
        const anchorX=frog.x, anchorY=frog.y-10;
        if(!t.returning){
          t.x += t.vx*dt; t.y += t.vy*dt; t.len=Math.hypot(t.x-anchorX, t.y-anchorY);
          if(t.len >= t.maxLen) t.returning=true;
        } else {
          const dx=anchorX-t.x, dy=anchorY-t.y, dist=Math.hypot(dx,dy), speed=1100;
          if(dist < 18) t.active=false;
          else { t.x += (dx/(dist||1))*speed*dt; t.y += (dy/(dist||1))*speed*dt; }
        }
        for(let i=state.flies.length-1;i>=0;i--){
          const fly=state.flies[i];
          if(Math.hypot(fly.x-t.x, fly.y-t.y) < fly.size + 8){
            state.score += fly.worth; updateHUD(); addBurst(fly.x, fly.y, 12, "catch"); state.flies.splice(i,1); t.returning=true;
          }
        }
      }

      for(let i=state.particles.length-1;i>=0;i--){
        const p=state.particles[i];
        p.age += dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 220*dt;
        if(p.age >= p.life) state.particles.splice(i,1);
      }
      updateHUD();
    }

    function drawCloud(x,y,s){ ctx.save(); ctx.translate(x,y); ctx.scale(s,s); ctx.fillStyle="rgba(255,255,255,.8)";
      ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.arc(22,-8,28,0,Math.PI*2); ctx.arc(50,2,22,0,Math.PI*2); ctx.arc(28,10,25,0,Math.PI*2); ctx.fill(); ctx.restore(); }
    function drawSkyAndWater(){
      for(let i=0;i<6;i++){ const x=(i*170+(performance.now()*0.01)%200)%(W+160)-80, y=50+(i%2)*30; drawCloud(x,y,0.9+(i%3)*0.12); }
      ctx.fillStyle="rgba(255,255,255,.14)";
      for(let i=0;i<7;i++){ const rx=(i*140+(performance.now()*0.03))%(W+100)-50; ctx.beginPath(); ctx.ellipse(rx, WATER_Y+28, 55, 8, 0, 0, Math.PI*2); ctx.fill(); }
    }
    function drawLilyPad(x,y,r){ ctx.save(); ctx.translate(x,y); ctx.fillStyle="#69db7c"; ctx.beginPath(); ctx.arc(0,0,r,0.25,Math.PI*1.92); ctx.lineTo(0,0); ctx.closePath(); ctx.fill(); ctx.restore(); }
    function drawFrog(frog){
      drawLilyPad(frog.x, frog.y+55, 86);
      ctx.save(); ctx.translate(frog.x,frog.y);
      ctx.fillStyle="#2f9e44"; ctx.beginPath(); ctx.ellipse(0,8,58,42,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#37b24d"; ctx.beginPath(); ctx.ellipse(0,15,40,24,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#2f9e44"; ctx.beginPath(); ctx.arc(-24,-22,15,0,Math.PI*2); ctx.arc(24,-22,15,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(-24,-22,8,0,Math.PI*2); ctx.arc(24,-22,8,0,Math.PI*2); ctx.fill();
      const lookX=pointer.active?(pointer.x-frog.x)*0.03:0, lookY=pointer.active?(pointer.y-frog.y)*0.03:0;
      ctx.fillStyle="#111"; ctx.beginPath();
      ctx.arc(-24+Math.max(-2,Math.min(2,lookX)),-22+Math.max(-2,Math.min(2,lookY)),3.5,0,Math.PI*2);
      ctx.arc(24+Math.max(-2,Math.min(2,lookX)),-22+Math.max(-2,Math.min(2,lookY)),3.5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="#1b4332"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,5,16,0.2,Math.PI-0.2); ctx.stroke(); ctx.restore();

      const t=frog.tongue;
      if(t.active){ ctx.strokeStyle="#ff6b6b"; ctx.lineWidth=6; ctx.lineCap="round"; ctx.beginPath(); ctx.moveTo(frog.x,frog.y-10); ctx.lineTo(t.x,t.y); ctx.stroke(); ctx.fillStyle="#fa5252"; ctx.beginPath(); ctx.arc(t.x,t.y,6,0,Math.PI*2); ctx.fill(); }
    }
    function drawFly(fly){
      ctx.save(); ctx.translate(fly.x, fly.y); const flap=Math.sin(performance.now()*0.03+fly.bob)*0.6;
      ctx.strokeStyle="rgba(255,255,255,.7)"; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(-5,-4,10,5,flap,0,Math.PI*2); ctx.ellipse(5,-4,10,5,-flap,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle="#212529"; ctx.beginPath(); ctx.ellipse(0,0,fly.size*0.78,fly.size*0.52,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="#212529"; ctx.lineWidth=1.5; for(let i=-1;i<=1;i+=2){ ctx.beginPath(); ctx.moveTo(i*4,2); ctx.lineTo(i*10,8); ctx.moveTo(i*4,-2); ctx.lineTo(i*10,-8); ctx.stroke(); }
      ctx.restore();
    }
    function drawParticles(){ for(const p of state.particles){ const alpha=1-p.age/p.life; ctx.fillStyle=`rgba(255,107,107,${alpha})`; ctx.beginPath(); ctx.arc(p.x,p.y,2.5+alpha*2,0,Math.PI*2); ctx.fill(); } }
    function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
    function drawOverlay(){
      if(!state.over){
        ctx.fillStyle="rgba(255,255,255,.18)"; ctx.fillRect(18,18,310,70);
        ctx.fillStyle="#173b2a"; ctx.font="bold 22px system-ui, sans-serif"; ctx.fillText("🐸 개구리 파리 잡기",34,48);
        ctx.font="16px system-ui, sans-serif"; ctx.fillText("모바일 웹앱 버전",34,74); return;
      }
      ctx.fillStyle="rgba(0,0,0,.35)"; ctx.fillRect(0,0,W,H);
      ctx.fillStyle="rgba(255,255,255,.92)"; roundRect(ctx,W/2-220,H/2-120,440,240,24); ctx.fill();
      ctx.fillStyle="#173b2a"; ctx.textAlign="center"; ctx.font="bold 40px system-ui, sans-serif"; ctx.fillText("게임 종료!",W/2,H/2-36);
      ctx.font="bold 26px system-ui, sans-serif"; ctx.fillText(`점수: ${state.score}`,W/2,H/2+12);
      ctx.font="18px system-ui, sans-serif"; ctx.fillText(`최고 점수: ${bestScore}`,W/2,H/2+50); ctx.fillText("R 키 또는 새로고침으로 다시 시작",W/2,H/2+88); ctx.textAlign="start";
    }
    function render(){
      ctx.clearRect(0,0,W,H); drawSkyAndWater();
      for(let i=0;i<4;i++) drawLilyPad(120+i*230+Math.sin(performance.now()*0.001+i)*8,H-60+Math.sin(performance.now()*0.002+i)*3,38+(i%2)*10);
      for(const fly of state.flies) drawFly(fly); drawParticles(); drawFrog(state.frog); drawOverlay();
    }

    let last=performance.now();
    function frame(now){ const dt=Math.min(0.033,(now-last)/1000); last=now; update(dt); render(); requestAnimationFrame(frame); }

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" || e.key === "ArrowRight") keys.add(e.key);
      if (e.code === "Space") { e.preventDefault(); const fly=nearestFly(); if(fly) shootTongue(fly.x, fly.y); }
      if ((e.key === "r" || e.key === "R") && state.over) resetGame();
    });
    window.addEventListener("keyup", (e) => { keys.delete(e.key); });

    function setPointerFromEvent(evt){
      const rect=canvas.getBoundingClientRect();
      pointer.x=(evt.clientX-rect.left)*(canvas.width/rect.width);
      pointer.y=(evt.clientY-rect.top)*(canvas.height/rect.height);
      pointer.active=true;
    }
    canvas.addEventListener("pointerdown", (e)=>{ setPointerFromEvent(e); shootTongue(pointer.x,pointer.y); });
    canvas.addEventListener("pointermove", (e)=>{ setPointerFromEvent(e); });

    function holdButton(el, key){
      const down = (e) => { e.preventDefault(); keys.add(key); };
      const up = (e) => { e.preventDefault(); keys.delete(key); };
      el.addEventListener("pointerdown", down);
      el.addEventListener("pointerup", up);
      el.addEventListener("pointercancel", up);
      el.addEventListener("pointerleave", up);
    }
    holdButton(leftBtn, "ArrowLeft");
    holdButton(rightBtn, "ArrowRight");
    shootBtn.addEventListener("pointerdown", (e)=>{ e.preventDefault(); const fly=nearestFly(); if(fly) shootTongue(fly.x, fly.y); else shootTongue(pointer.x,pointer.y); });

    resetGame();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
