<!DOCTYPE html><html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개구리 게임</title>
<style>
body {margin:0;font-family:sans-serif;background:linear-gradient(#d8fbe4,#a5f3fc);text-align:center;}
.wrap{max-width:430px;margin:auto;padding:10px;}
canvas{width:100%;border-radius:20px;background:linear-gradient(#c7f9cc 0 30%,#74c0fc 30%);}
button{padding:12px 25px;font-size:18px;background:#2f9e44;color:white;border:none;border-radius:12px;margin:10px;}
</style>
</head>
<body><div class="wrap">
<h2>🐸 개구리 게임</h2>
<button id="startBtn">게임 시작</button>
<canvas id="game" width="400" height="600"></canvas>
</div><script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");

let bugs=[], running=false, last=0, spawn=0;

const frog={x:200,y:520};

const AudioCtx = window.AudioContext||window.webkitAudioContext;
const audioCtx=new AudioCtx();
let bgmInterval=null;

// 🔊 효과음
function beep(f,d=0.1){
 const o=audioCtx.createOscillator();
 const g=audioCtx.createGain();
 o.frequency.value=f;
 o.connect(g); g.connect(audioCtx.destination);
 g.gain.value=0.03;
 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
 o.stop(audioCtx.currentTime+d);
}

// 🎵 배경음
function startBgm(){
 clearInterval(bgmInterval);
 let notes=[440,523,659,523];
 let i=0;
 bgmInterval=setInterval(()=>{
   beep(notes[i%notes.length],0.15);
   i++;
 },300);
}

// 🐛 벌레
function spawnBug(){
 bugs.push({
   x:Math.random()*360+20,
   y:Math.random()*300+100,
   vx:(Math.random()-0.5)*100,
   vy:(Math.random()-0.5)*60
 });
}

// 🎮 시작
startBtn.onclick=()=>{
 if(audioCtx.state==="suspended") audioCtx.resume();
 running=true;
 bugs=[];
 for(let i=0;i<5;i++)spawnBug();
 startBgm();
};

// 🖱 클릭
canvas.onclick=e=>{
 if(!running)return;
 const r=canvas.getBoundingClientRect();
 const x=e.clientX-r.left;
 const y=e.clientY-r.top;

 bugs=bugs.filter(b=>{
  const hit=Math.hypot(b.x-x,b.y-y)<20;
  if(hit)beep(800);
  return !hit;
 });
};

// 🔁 루프
function loop(t){
 const dt=(t-last)/1000; last=t;
 ctx.clearRect(0,0,400,600);

 if(running){
   spawn+=dt;
   if(spawn>1){spawn=0;spawnBug();}

   bugs.forEach(b=>{
     b.x+=b.vx*dt;
     b.y+=b.vy*dt;
     ctx.beginPath();
     ctx.arc(b.x,b.y,10,0,Math.PI*2);
     ctx.fill();
   });
 }

 // 개구리
 ctx.fillStyle="green";
 ctx.beginPath();
 ctx.arc(frog.x,frog.y,30,0,Math.PI*2);
 ctx.fill();

 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body>
</html>
