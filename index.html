<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개구리 게임</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(#d8fbe4, #a5f3fc);
      text-align: center;
    }

    .wrap {
      max-width: 420px;
      margin: 0 auto;
      padding: 12px;
    }

    h2 {
      margin: 12px 0 8px;
      color: #184d33;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      font-weight: bold;
      color: #184d33;
    }

    .pill {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 999px;
      padding: 8px 12px;
      flex: 1;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      background: #2f9e44;
      color: white;
      border: none;
      border-radius: 15px;
      margin-bottom: 12px;
    }

    canvas {
      background: linear-gradient(#bdecc7 0 28%, #74c0fc 28% 100%);
      display: block;
      margin: 0 auto;
      border-radius: 20px;
      width: 100%;
      height: auto;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>🐸 개구리 파리 잡기</h2>

    <div class="hud">
      <div class="pill">점수: <span id="score">0</span></div>
      <div class="pill">시간: <span id="time">60</span>초</div>
      <div class="pill">최고: <span id="best">0</span></div>
    </div>

    <button id="startBtn">게임 시작</button>
    <canvas id="game" width="400" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");
    const startBtn = document.getElementById("startBtn");

    let score = 0;
    let bestScore = Number(localStorage.getItem("frogBestScore") || 0);
    let timeLeft = 60;
    let gameRunning = false;

    let bugs = [];
    let animationId = null;
    let spawnTimer = 0;
    let lastTime = 0;

    const frog = {
      x: 200,
      y: 540,
      radius: 32
    };

    bestEl.textContent = bestScore;

    function resetGame() {
      score = 0;
      timeLeft = 60;
      bugs = [];
      spawnTimer = 0;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      frog.x = 200;
    }

    function startGame() {
      resetGame();
      gameRunning = true;
      startBtn.textContent = "게임 중...";
      startBtn.disabled = true;

      for (let i = 0; i < 6; i++) {
        spawnBug(true);
      }

      if (animationId) cancelAnimationFrame(animationId);
      lastTime = performance.now();
      animationId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
      gameRunning = false;
      startBtn.textContent = "다시 시작";
      startBtn.disabled = false;

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("frogBestScore", String(bestScore));
        bestEl.textContent = bestScore;
      }
    }

    function spawnBug(initial = false) {
      const side = Math.random() < 0.5 ? -20 : 420;
      const speedBase = 50 + Math.random() * 70;

      bugs.push({
        x: initial ? Math.random() * 360 + 20 : side,
        y: Math.random() * 250 + 120,
        r: 12 + Math.random() * 4,
        vx: initial
          ? (Math.random() < 0.5 ? -1 : 1) * speedBase
          : (side < 0 ? 1 : -1) * speedBase,
        vy: (Math.random() - 0.5) * 25,
        wave: Math.random() * Math.PI * 2
      });
    }

    function update(dt) {
      if (!gameRunning) return;

      timeLeft -= dt;
      if (timeLeft <= 0) {
        timeLeft = 0;
        timeEl.textContent = "0";
        endGame();
        return;
      }
      timeEl.textContent = Math.ceil(timeLeft);

      spawnTimer += dt;
      if (spawnTimer >= 0.9) {
        spawnTimer = 0;
        spawnBug(false);
      }

      for (let i = bugs.length - 1; i >= 0; i--) {
        const bug = bugs[i];
        bug.wave += dt * 8;
        bug.x += bug.vx * dt;
        bug.y += bug.vy * dt + Math.sin(bug.wave) * 20 * dt;

        if (bug.y < 90 || bug.y > 420) bug.vy *= -1;

        if (bug.x < -40 || bug.x > 440) {
          bugs.splice(i, 1);
        }
      }
    }

    function drawBackground() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(255,255,255,0.45)";
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(60 + i * 100, 85, 20, 0, Math.PI * 2);
        ctx.arc(80 + i * 100, 75, 24, 0, Math.PI * 2);
        ctx.arc(100 + i * 100, 85, 20, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBug(bug) {
      ctx.save();
      ctx.translate(bug.x, bug.y);

      ctx.strokeStyle = "rgba(255,255,255,0.7)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(-5, -4, 10, 5, 0.5, 0, Math.PI * 2);
      ctx.ellipse(5, -4, 10, 5, -0.5, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "black";
      ctx.beginPath();
      ctx.arc(0, 0, bug.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawFrog() {
      ctx.save();
      ctx.translate(frog.x, frog.y);

      ctx.fillStyle = "#69db7c";
      ctx.beginPath();
      ctx.ellipse(0, 40, 65, 20, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#2f9e44";
      ctx.beginPath();
      ctx.arc(0, 0, frog.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#2f9e44";
      ctx.beginPath();
      ctx.arc(-14, -20, 10, 0, Math.PI * 2);
      ctx.arc(14, -20, 10, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(-14, -20, 5, 0, Math.PI * 2);
      ctx.arc(14, -20, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "black";
      ctx.beginPath();
      ctx.arc(-14, -20, 2.5, 0, Math.PI * 2);
      ctx.arc(14, -20, 2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#173b2a";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 5, 11, 0.2, Math.PI - 0.2);
      ctx.stroke();

      ctx.restore();
    }

    function draw() {
      drawBackground();

      for (const bug of bugs) {
        drawBug(bug);
      }

      drawFrog();

      if (!gameRunning) {
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";
        ctx.fillRect(70, 200, 260, 120);

        ctx.fillStyle = "#184d33";
        ctx.font = "bold 26px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("화면을 눌러 벌레 잡기", 200, 245);
        ctx.font = "18px sans-serif";
        ctx.fillText("시작 버튼을 누르세요", 200, 282);
        ctx.textAlign = "start";
      }
    }

    function gameLoop(timestamp) {
      const dt = Math.min(0.033, (timestamp - lastTime) / 1000);
      lastTime = timestamp;

      update(dt);
      draw();

      if (gameRunning) {
        animationId = requestAnimationFrame(gameLoop);
      } else {
        draw();
      }
    }

    function hitBug(x, y) {
      if (!gameRunning) return;

      for (let i = bugs.length - 1; i >= 0; i--) {
        const bug = bugs[i];
        const d = Math.hypot(x - bug.x, y - bug.y);
        if (d < bug.r + 10) {
          bugs.splice(i, 1);
          score += 1;
          scoreEl.textContent = score;
          return;
        }
      }
    }

    function getCanvasPos(evt) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (evt.clientX - rect.left) * (canvas.width / rect.width),
        y: (evt.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    canvas.addEventListener("click", (e) => {
      const pos = getCanvasPos(e);
      hitBug(pos.x, pos.y);
    });

    startBtn.addEventListener("click", startGame);

    draw();
  </script>
</body>
</html>
