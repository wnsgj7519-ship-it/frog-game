<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>개구리 파리 잡기 - 스테이지 모드</title>

  <meta name="theme-color" content="#2f9e44" />
  <meta name="description" content="개구리 혀로 파리를 잡는 스테이지형 모바일 게임" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./frog_icon.png" />
  <link rel="apple-touch-icon" href="./frog_icon.png" />

  <style>
    :root {
      --bg-top: #d8fbe4;
      --bg-bottom: #a5f3fc;
      --panel: rgba(255,255,255,0.88);
      --text: #184d33;
      --green: #2f9e44;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Apple SD Gothic Neo, Malgun Gothic, sans-serif;
      background: linear-gradient(var(--bg-top), var(--bg-bottom));
      color: var(--text);
      text-align: center;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 10px 10px 18px;
    }

    h1 {
      font-size: 28px;
      margin: 10px 0 8px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .pill {
      background: var(--panel);
      border-radius: 16px;
      padding: 10px 8px;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      font-size: 14px;
    }

    button {
      padding: 14px 28px;
      font-size: 18px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      margin: 6px 0 10px;
      font-weight: 800;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 22px;
      background: linear-gradient(#c7f9cc 0 28%, #74c0fc 28% 100%);
      touch-action: none;
      box-shadow: 0 18px 36px rgba(0,0,0,0.18);
    }

    .tip {
      margin-top: 10px;
      background: var(--panel);
      border-radius: 16px;
      padding: 12px;
      line-height: 1.5;
      font-size: 13px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🐸 개구리 파리 잡기</h1>

    <div class="hud">
      <div class="pill">스테이지<br><span id="stage">1</span></div>
      <div class="pill">점수<br><span id="score">0</span></div>
      <div class="pill">목표<br><span id="goal">15</span></div>
      <div class="pill">시간<br><span id="time">30</span></div>
    </div>

    <button id="startBtn">게임 시작</button>
    <canvas id="game" width="420" height="680"></canvas>

    <div class="tip">
      30초 안에 15점 이상이면 다음 스테이지로 넘어갑니다.
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
