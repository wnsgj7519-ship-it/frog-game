<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>개구리 파리 잡기 - 스테이지 모드 완성본</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #b9ecff;
    }

    body {
      touch-action: manipulation;
    }

    #gameWrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(to top, #68c25f 0 24%, #9fe7ff 24% 100%);
    }

    .cloud {
      position: absolute;
      top: 6%;
      width: 90px;
      height: 40px;
      background: rgba(255,255,255,0.92);
      border-radius: 30px;
      filter: blur(0.3px);
      opacity: 0.9;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.92);
      border-radius: 50%;
    }

    .cloud::before {
      width: 42px;
      height: 42px;
      left: 12px;
      top: -18px;
    }

    .cloud::after {
      width: 52px;
      height: 52px;
      right: 10px;
      top: -22px;
    }

    #pond {
      position: absolute;
      left: 50%;
      bottom: 70px;
      transform: translateX(-50%);
      width: 220px;
      height: 90px;
      background: radial-gradient(circle at center, #60d8ff 0%, #1cb3e8 62%, #1286b7 100%);
      border-radius: 50%;
      box-shadow: inset 0 6px 0 rgba(255,255,255,0.25);
    }

    #frog {
      position: absolute;
      left: 50%;
      bottom: 95px;
      transform: translateX(-50%);
      width: 140px;
      height: 110px;
      z-index: 5;
    }

    .frog-body {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 110px;
      height: 74px;
      background: #31b84d;
      border-radius: 55px 55px 42px 42px;
      border: 3px solid #1b7e31;
    }

    .eye {
      position: absolute;
      top: 6px;
      width: 28px;
      height: 28px;
      background: #31b84d;
      border-radius: 50%;
      border: 3px solid #1b7e31;
    }

    .eye.left { left: 28px; }
    .eye.right { right: 28px; }

    .eye::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 7px;
      width: 10px;
      height: 10px;
      background: #111;
      border-radius: 50%;
    }

    .cheek {
      position: absolute;
      top: 46px;
      width: 15px;
      height: 10px;
      background: rgba(255, 160, 160, 0.8);
      border-radius: 50%;
    }

    .cheek.left { left: 24px; }
    .cheek.right { right: 24px; }

    .mouth {
      position: absolute;
      left: 50%;
      top: 52px;
      transform: translateX(-50%);
      width: 34px;
      height: 15px;
      border-bottom: 3px solid #155724;
      border-radius: 0 0 18px 18px;
    }

    #tongue {
      position: absolute;
      left: 50%;
      bottom: 44px;
      width: 0;
      height: 6px;
      background: linear-gradient(to right, #ff7aa8, #ff4f8d);
      border-radius: 4px;
      transform-origin: left center;
      transform: rotate(0deg);
      z-index: 4;
      opacity: 0;
      box-shadow: 0 0 6px rgba(255, 79, 141, 0.3);
    }

    #flyLayer {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    .fly {
      position: absolute;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      cursor: pointer;
      transform: translate(-50%, -50%);
      will-change: transform, left, top;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25));
    }

    .fly.hit {
      animation: pop 0.18s ease-out forwards;
      pointer-events: none;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
    }

    #hud {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: 10px;
      right: 10px;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .panel {
      background: rgba(255,255,255,0.88);
      border-radius: 16px;
      padding: 10px 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
      font-size: 14px;
      line-height: 1.45;
      color: #113;
    }

    .panel strong {
      font-size: 16px;
    }

    #topButtons {
      position: absolute;
      right: 10px;
      top: calc(max(12px, env(safe-area-inset-top)) + 98px);
      z-index: 25;
      display: flex;
      gap: 8px;
      flex-direction: column;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      cursor: pointer;
    }

    #startBtn { background: #1bb34a; color: #fff; }
    #pauseBtn { background: #ffc93c; color: #222; }
    #endBtn { background: #ff5a5a; color: #fff; }

    #stageBanner {
      position: absolute;
      left: 50%;
      top: 26%;
      transform: translate(-50%, -50%);
      z-index: 30;
      min-width: 250px;
      max-width: 90vw;
      padding: 16px 20px;
      background: rgba(0,0,0,0.72);
      color: #fff;
      border-radius: 18px;
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      display: none;
    }

    #messageOverlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      background: rgba(0, 0, 0, 0.42);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #messageBox {
      width: min(92vw, 420px);
      background: #fff;
      border-radius: 24px;
      padding: 24px 18px 18px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    #messageTitle {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 900;
      color: #134;
    }

    #messageText {
      font-size: 16px;
      line-height: 1.6;
      color: #333;
      white-space: pre-line;
      margin-bottom: 16px;
    }

    #messageBtn {
      background: #2f9e44;
      color: white;
      min-width: 150px;
    }

    #bottomGuide {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(255,255,255,0.85);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      color: #234;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <div class="cloud" style="left:8%; top:8%;"></div>
    <div class="cloud" style="left:70%; top:12%; transform:scale(1.1);"></div>

    <div id="hud">
      <div class="panel">
        <div>스테이지: <strong id="stageText">1</strong></div>
        <div>남은 시간: <strong id="timeText">20</strong>초</div>
      </div>
      <div class="panel">
        <div>현재 스테이지 점수: <strong id="stageScoreText">0</strong> / 15</div>
        <div>총 누적 점수: <strong id="totalScoreText">0</strong></div>
      </div>
    </div>

    <div id="topButtons">
      <button id="startBtn">게임 시작</button>
      <button id="pauseBtn">일시정지</button>
      <button id="endBtn">게임 종료</button>
    </div>

    <div id="stageBanner"></div>

    <div id="flyLayer"></div>

    <div id="pond"></div>

    <div id="frog">
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="frog-body"></div>
      <div class="cheek left"></div>
      <div class="cheek right"></div>
      <div class="mouth"></div>
    </div>

    <div id="tongue"></div>

    <div id="bottomGuide">파리를 터치해서 잡으세요</div>

    <div id="messageOverlay">
      <div id="messageBox">
        <div id="messageTitle">개구리 파리 잡기</div>
        <div id="messageText">각 스테이지에서 제한시간 안에
15점 이상을 얻어야 다음 단계로 넘어갑니다.

누적점수가 아니라
그 스테이지 안에서만 15점 이상이어야 합니다.</div>
        <button id="messageBtn">시작하기</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const gameWrap = document.getElementById("gameWrap");
      const flyLayer = document.getElementById("flyLayer");
      const frog = document.getElementById("frog");
      const tongue = document.getElementById("tongue");

      const stageText = document.getElementById("stageText");
      const timeText = document.getElementById("timeText");
      const stageScoreText = document.getElementById("stageScoreText");
      const totalScoreText = document.getElementById("totalScoreText");

      const startBtn = document.getElementById("startBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const endBtn = document.getElementById("endBtn");

      const stageBanner = document.getElementById("stageBanner");

      const messageOverlay = document.getElementById("messageOverlay");
      const messageTitle = document.getElementById("messageTitle");
      const messageText = document.getElementById("messageText");
      const messageBtn = document.getElementById("messageBtn");

      const GAME = {
        stage: 1,
        totalScore: 0,
        stageScore: 0,
        timeLeft: 20,
        targetPerStage: 15,
        isPlaying: false,
        isPaused: false,
        timerId: null,
        spawnId: null,
        moveId: null,
        activeFlies: [],
        maxStage: 5
      };

      const stageConfig = {
        1: { time: 20, spawnMs: 1100, flyMax: 2, speed: 1.2 },
        2: { time: 20, spawnMs: 950,  flyMax: 3, speed: 1.6 },
        3: { time: 18, spawnMs: 820,  flyMax: 4, speed: 2.0 },
        4: { time: 18, spawnMs: 720,  flyMax: 5, speed: 2.35 },
        5: { time: 16, spawnMs: 620,  flyMax: 6, speed: 2.7 }
      };

      let audioCtx = null;
      let bgmOsc = null;
      let bgmGain = null;
      let bgmLfo = null;
      let bgmLfoGain = null;
      let audioUnlocked = false;

      function updateHUD() {
        stageText.textContent = String(GAME.stage);
        timeText.textContent = String(GAME.timeLeft);
        stageScoreText.textContent = String(GAME.stageScore);
        totalScoreText.textContent = String(GAME.totalScore);
      }

      function showOverlay(title, text, btnText, btnHandler) {
        messageTitle.textContent = title;
        messageText.textContent = text;
        messageBtn.textContent = btnText;
        messageOverlay.style.display = "flex";
        messageBtn.onclick = btnHandler;
      }

      function hideOverlay() {
        messageOverlay.style.display = "none";
      }

      function showBanner(text) {
        stageBanner.textContent = text;
        stageBanner.style.display = "block";
        clearTimeout(stageBanner._timer);
        stageBanner._timer = setTimeout(() => {
          stageBanner.style.display = "none";
        }, 1400);
      }

      function clearAllLoops() {
        if (GAME.timerId) {
          clearInterval(GAME.timerId);
          GAME.timerId = null;
        }
        if (GAME.spawnId) {
          clearInterval(GAME.spawnId);
          GAME.spawnId = null;
        }
        if (GAME.moveId) {
          cancelAnimationFrame(GAME.moveId);
          GAME.moveId = null;
        }
      }

      function removeAllFlies() {
        for (const fly of GAME.activeFlies) {
          if (fly.el && fly.el.parentNode) {
            fly.el.remove();
          }
        }
        GAME.activeFlies = [];
      }

      function resetEntireGame() {
        clearAllLoops();
        removeAllFlies();
        GAME.stage = 1;
        GAME.totalScore = 0;
        GAME.stageScore = 0;
        GAME.timeLeft = stageConfig[1].time;
        GAME.isPlaying = false;
        GAME.isPaused = false;
        updateHUD();
        resetTongue();
      }

      function resetTongue() {
        tongue.style.opacity = "0";
        tongue.style.width = "0px";
        tongue.style.transform = "rotate(0deg)";
      }

      function getPlayArea() {
        const rect = gameWrap.getBoundingClientRect();
        const topMin = 80;
        const bottomMax = rect.height - 170;
        const leftMin = 20;
        const rightMax = rect.width - 20;
        return { rect, topMin, bottomMax, leftMin, rightMax };
      }

      function randomRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      function spawnFly() {
        if (!GAME.isPlaying || GAME.isPaused) return;

        const config = stageConfig[GAME.stage] || stageConfig[GAME.maxStage];
        if (GAME.activeFlies.length >= config.flyMax) return;

        const { leftMin, rightMax, topMin, bottomMax } = getPlayArea();

        const el = document.createElement("div");
        el.className = "fly";
        el.textContent = "🪰";

        const fly = {
          id: `${Date.now()}_${Math.random()}`,
          el,
          x: randomRange(leftMin + 20, rightMax - 20),
          y: randomRange(topMin + 20, bottomMax - 20),
          vx: (Math.random() < 0.5 ? -1 : 1) * randomRange(0.8, config.speed),
          vy: (Math.random() < 0.5 ? -1 : 1) * randomRange(0.8, config.speed),
          alive: true
        };

        el.style.left = fly.x + "px";
        el.style.top = fly.y + "px";

        const hitHandler = (event) => {
          event.preventDefault();
          event.stopPropagation();
          catchFly(fly);
        };

        el.addEventListener("pointerdown", hitHandler, { passive: false });
        el.addEventListener("click", hitHandler, { passive: false });

        flyLayer.appendChild(el);
        GAME.activeFlies.push(fly);
      }

      function moveFlies() {
        if (!GAME.isPlaying) return;
        if (!GAME.isPaused) {
          const { leftMin, rightMax, topMin, bottomMax } = getPlayArea();

          for (const fly of GAME.activeFlies) {
            if (!fly.alive) continue;

            fly.x += fly.vx;
            fly.y += fly.vy;

            if (fly.x <= leftMin || fly.x >= rightMax) {
              fly.vx *= -1;
              fly.x = Math.max(leftMin, Math.min(rightMax, fly.x));
            }
            if (fly.y <= topMin || fly.y >= bottomMax) {
              fly.vy *= -1;
              fly.y = Math.max(topMin, Math.min(bottomMax, fly.y));
            }

            if (Math.random() < 0.02) {
              fly.vx += randomRange(-0.35, 0.35);
              fly.vy += randomRange(-0.35, 0.35);

              const speedLimit = (stageConfig[GAME.stage] || stageConfig[GAME.maxStage]).speed + 1.2;
              fly.vx = Math.max(-speedLimit, Math.min(speedLimit, fly.vx));
              fly.vy = Math.max(-speedLimit, Math.min(speedLimit, fly.vy));
            }

            fly.el.style.left = fly.x + "px";
            fly.el.style.top = fly.y + "px";
          }
        }

        GAME.moveId = requestAnimationFrame(moveFlies);
      }

      function catchFly(fly) {
        if (!fly || !fly.alive || !GAME.isPlaying || GAME.isPaused) return;

        fly.alive = false;
        animateTongueTo(fly.x, fly.y);

        GAME.stageScore += 1;
        GAME.totalScore += 1;
        updateHUD();

        fly.el.classList.add("hit");

        setTimeout(() => {
          removeFly(fly.id);
        }, 160);

        if (GAME.stageScore >= GAME.targetPerStage) {
          nextStage();
        }
      }

      function removeFly(id) {
        const idx = GAME.activeFlies.findIndex(f => f.id === id);
        if (idx >= 0) {
          const fly = GAME.activeFlies[idx];
          if (fly.el && fly.el.parentNode) fly.el.remove();
          GAME.activeFlies.splice(idx, 1);
        }
      }

      function animateTongueTo(targetX, targetY) {
        const frogRect = frog.getBoundingClientRect();
        const wrapRect = gameWrap.getBoundingClientRect();

        const startX = frogRect.left - wrapRect.left + frogRect.width / 2;
        const startY = frogRect.top - wrapRect.top + frogRect.height * 0.62;

        const dx = targetX - startX;
        const dy = targetY - startY;
        const length = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;

        tongue.style.left = startX + "px";
        tongue.style.bottom = (wrapRect.height - startY - 3) + "px";
        tongue.style.opacity = "1";
        tongue.style.width = length + "px";
        tongue.style.transform = `rotate(${angle}deg)`;

        clearTimeout(tongue._timer);
        tongue._timer = setTimeout(resetTongue, 120);
      }

      function startStage(stageNumber) {
        clearAllLoops();
        removeAllFlies();

        const config = stageConfig[stageNumber] || stageConfig[GAME.maxStage];

        GAME.stage = stageNumber;
        GAME.stageScore = 0;
        GAME.timeLeft = config.time;
        GAME.isPlaying = true;
        GAME.isPaused = false;
        updateHUD();

        showBanner(`스테이지 ${stageNumber} 시작!`);

        for (let i = 0; i < Math.min(2, config.flyMax); i++) {
          spawnFly();
        }

        GAME.timerId = setInterval(() => {
          if (!GAME.isPlaying || GAME.isPaused) return;

          GAME.timeLeft -= 1;
          updateHUD();

          if (GAME.timeLeft <= 0) {
            if (GAME.stageScore >= GAME.targetPerStage) {
              nextStage();
            } else {
              failGame();
            }
          }
        }, 1000);

        GAME.spawnId = setInterval(() => {
          spawnFly();
        }, config.spawnMs);

        GAME.moveId = requestAnimationFrame(moveFlies);
      }

      function nextStage() {
        if (!GAME.isPlaying) return;

        clearAllLoops();
        removeAllFlies();

        if (GAME.stage >= GAME.maxStage) {
          winGame();
          return;
        }

        const next = GAME.stage + 1;

        showOverlay(
          `스테이지 ${GAME.stage} 클리어!`,
          `현재 스테이지에서 ${GAME.stageScore}점을 획득했습니다.\n다음 스테이지로 이동합니다.`,
          "다음 스테이지",
          () => {
            hideOverlay();
            startStage(next);
          }
        );
      }

      function failGame() {
        GAME.isPlaying = false;
        GAME.isPaused = false;
        clearAllLoops();
        removeAllFlies();
        stopBGM();

        showOverlay(
          "게임 오버",
          `스테이지 ${GAME.stage}에서 제한시간 내\n15점을 채우지 못했습니다.\n\n현재 스테이지 점수: ${GAME.stageScore}\n총 누적 점수: ${GAME.totalScore}`,
          "처음부터 다시",
          () => {
            hideOverlay();
            resetEntireGame();
            unlockAudioAndStart();
          }
        );
      }

      function winGame() {
        GAME.isPlaying = false;
        GAME.isPaused = false;
        clearAllLoops();
        removeAllFlies();
        stopBGM();

        showOverlay(
          "최종 클리어!",
          `모든 스테이지를 통과했습니다.\n\n총 누적 점수: ${GAME.totalScore}`,
          "다시 플레이",
          () => {
            hideOverlay();
            resetEntireGame();
            unlockAudioAndStart();
          }
        );
      }

      function manualEndGame() {
        GAME.isPlaying = false;
        GAME.isPaused = false;
        clearAllLoops();
        removeAllFlies();
        stopBGM();

        showOverlay(
          "게임 종료",
          `게임을 종료했습니다.\n\n총 누적 점수: ${GAME.totalScore}`,
          "다시 시작",
          () => {
            hideOverlay();
            resetEntireGame();
            unlockAudioAndStart();
          }
        );
      }

      function togglePause() {
        if (!GAME.isPlaying) return;

        GAME.isPaused = !GAME.isPaused;
        pauseBtn.textContent = GAME.isPaused ? "다시 시작" : "일시정지";

        if (GAME.isPaused) {
          pauseBGM();
          showBanner("일시정지");
        } else {
          resumeBGM();
          showBanner("재시작");
        }
      }

      function initAudio() {
        if (audioUnlocked) return;

        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return;

          audioCtx = new AudioContextClass();

          bgmOsc = audioCtx.createOscillator();
          bgmGain = audioCtx.createGain();
          bgmLfo = audioCtx.createOscillator();
          bgmLfoGain = audioCtx.createGain();

          bgmOsc.type = "triangle";
          bgmOsc.frequency.value = 220;

          bgmLfo.type = "sine";
          bgmLfo.frequency.value = 2.4;
          bgmLfoGain.gain.value = 18;

          bgmLfo.connect(bgmLfoGain);
          bgmLfoGain.connect(bgmOsc.frequency);

          bgmGain.gain.value = 0.0;

          bgmOsc.connect(bgmGain);
          bgmGain.connect(audioCtx.destination);

          bgmOsc.start();
          bgmLfo.start();

          audioUnlocked = true;
        } catch (err) {
          console.error("오디오 초기화 실패:", err);
        }
      }

      async function unlockAudioAndStart() {
        initAudio();

        try {
          if (audioCtx && audioCtx.state === "suspended") {
            await audioCtx.resume();
          }
        } catch (err) {
          console.error("오디오 resume 실패:", err);
        }

        startBGM();
        startStage(1);
      }

      function startBGM() {
        if (!audioCtx || !bgmGain) return;
        try {
          const now = audioCtx.currentTime;
          bgmGain.gain.cancelScheduledValues(now);
          bgmGain.gain.setValueAtTime(bgmGain.gain.value, now);
          bgmGain.gain.linearRampToValueAtTime(0.03, now + 0.25);
        } catch (err) {
          console.error("BGM 시작 실패:", err);
        }
      }

      function stopBGM() {
        if (!audioCtx || !bgmGain) return;
        try {
          const now = audioCtx.currentTime;
          bgmGain.gain.cancelScheduledValues(now);
          bgmGain.gain.setValueAtTime(bgmGain.gain.value, now);
          bgmGain.gain.linearRampToValueAtTime(0.0, now + 0.2);
        } catch (err) {
          console.error("BGM 정지 실패:", err);
        }
      }

      function pauseBGM() {
        stopBGM();
      }

      function resumeBGM() {
        startBGM();
      }

      startBtn.addEventListener("click", () => {
        hideOverlay();
        if (!GAME.isPlaying) {
          unlockAudioAndStart();
        }
      });

      messageBtn.addEventListener("click", () => {
        hideOverlay();
        if (!GAME.isPlaying) {
          unlockAudioAndStart();
        }
      });

      pauseBtn.addEventListener("click", togglePause);

      endBtn.addEventListener("click", () => {
        manualEndGame();
      });

      window.addEventListener("resize", () => {
        updateHUD();
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && GAME.isPlaying && !GAME.isPaused) {
          GAME.isPaused = true;
          pauseBtn.textContent = "다시 시작";
          pauseBGM();
        }
      });

      window.addEventListener("error", (event) => {
        console.error("전역 오류:", event.error || event.message);
      });

      window.addEventListener("unhandledrejection", (event) => {
        console.error("Promise 오류:", event.reason);
      });

      resetEntireGame();
      showOverlay(
        "개구리 파리 잡기",
        "각 스테이지에서 제한시간 안에\n15점 이상을 얻어야 다음 단계로 넘어갑니다.\n\n중요:\n누적 점수가 아니라\n현재 스테이지 점수만 기준입니다.",
        "시작하기",
        () => {
          hideOverlay();
          unlockAudioAndStart();
        }
      );
    })();
  </script>
</body>
</html>
