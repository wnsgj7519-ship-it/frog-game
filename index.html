<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>개구리 파리 잡기</title>

  <meta name="theme-color" content="#2f9e44" />
  <meta name="description" content="개구리 혀로 파리를 잡는 스테이지형 모바일 게임" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./frog_icon.png" />
  <link rel="apple-touch-icon" href="./frog_icon.png" />

  <style>
    :root {
      --bg1: #b7f28e;
      --bg2: #5bbf4b;
      --panel: rgba(255,255,255,0.88);
      --text: #173b12;
      --accent: #2f9e44;
      --danger: #e03131;
      --shadow: 0 10px 25px rgba(0,0,0,0.18);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.35), transparent 18%),
        radial-gradient(circle at 85% 20%, rgba(255,255,255,0.2), transparent 15%),
        linear-gradient(180deg, #d9f99d 0%, #9be15d 40%, #53b84f 100%);
    }

    #topBar {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 10px);
      left: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      z-index: 20;
      flex-wrap: wrap;
    }

    .chip {
      background: var(--panel);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
    }

    #gameArea {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    #lilyPad {
      position: absolute;
      bottom: 78px;
      left: 50%;
      transform: translateX(-50%);
      width: min(42vw, 220px);
      height: min(18vw, 90px);
      border-radius: 50%;
      background: radial-gradient(circle at 50% 40%, #51cf66 0%, #37b24d 60%, #2b8a3e 100%);
      box-shadow: inset -10px -10px 20px rgba(0,0,0,0.15), var(--shadow);
      z-index: 5;
    }

    #frog {
      position: absolute;
      left: 50%;
      bottom: 92px;
      transform: translateX(-50%);
      width: min(28vw, 140px);
      height: min(28vw, 140px);
      border-radius: 50%;
      background: radial-gradient(circle at 50% 40%, #69db7c 0%, #40c057 70%, #2f9e44 100%);
      box-shadow: var(--shadow);
      z-index: 8;
    }

    #frog::before, #frog::after {
      content: "";
      position: absolute;
      top: 14%;
      width: 24%;
      height: 24%;
      border-radius: 50%;
      background: white;
      box-shadow: inset 0 0 0 2px rgba(0,0,0,0.08);
    }

    #frog::before { left: 18%; }
    #frog::after { right: 18%; }

    .eye {
      position: absolute;
      top: 20%;
      width: 8%;
      height: 8%;
      border-radius: 50%;
      background: #111;
      z-index: 9;
    }

    #eyeL { left: 29%; }
    #eyeR { right: 29%; }

    #mouth {
      position: absolute;
      left: 50%;
      bottom: 24%;
      transform: translateX(-50%);
      width: 44%;
      height: 12%;
      border-radius: 0 0 999px 999px;
      border-bottom: 4px solid #1b4332;
      z-index: 9;
    }

    #tongue {
      position: absolute;
      left: 50%;
      bottom: 130px;
      width: 10px;
      height: 0;
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(0deg);
      background: linear-gradient(180deg, #ff8fab, #f06595);
      border-radius: 999px;
      z-index: 7;
      opacity: 0;
      box-shadow: 0 0 10px rgba(240,101,149,0.35);
    }

    .fly {
      position: absolute;
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      font-size: 34px;
      line-height: 1;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
      z-index: 12;
      will-change: transform, left, top;
    }

    .fly .wing {
      position: absolute;
      top: 14px;
      width: 14px;
      height: 14px;
      background: rgba(255,255,255,0.72);
      border-radius: 50%;
      animation: flap 0.12s infinite alternate;
    }

    .fly .wing.left { left: 5px; }
    .fly .wing.right { right: 5px; }

    .fly .body {
      position: relative;
      z-index: 2;
      font-size: 30px;
    }

    @keyframes flap {
      from { transform: scale(0.9) translateY(0); }
      to { transform: scale(1.08) translateY(-2px); }
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 20px;
    }

    .modal {
      width: min(92vw, 500px);
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px 18px 20px;
      text-align: center;
    }

    .modal h1, .modal h2 {
      margin: 0 0 12px 0;
      color: #1b4332;
    }

    .modal p {
      margin: 8px 0;
      line-height: 1.45;
      font-weight: 700;
    }

    .buttonRow {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      min-width: 130px;
      font-size: 16px;
      font-weight: 900;
      background: var(--accent);
      color: white;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    button.secondary {
      background: #495057;
    }

    button.danger {
      background: var(--danger);
    }

    #toast {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 40;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 78px;
      background: linear-gradient(180deg, #8d6e63, #6d4c41);
      z-index: 1;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="topBar">
      <div class="chip" id="stageChip">스테이지 1</div>
      <div class="chip" id="needChip">목표 15점</div>
      <div class="chip" id="stageScoreChip">현재 스테이지 0점</div>
      <div class="chip" id="totalScoreChip">총점 0점</div>
      <div class="chip" id="timeChip">남은 시간 20초</div>
    </div>

    <div id="gameArea"></div>

    <div id="tongue"></div>

    <div id="lilyPad"></div>
    <div id="frog">
      <div class="eye" id="eyeL"></div>
      <div class="eye" id="eyeR"></div>
      <div id="mouth"></div>
    </div>

    <div id="ground"></div>

    <div id="overlay">
      <div class="modal" id="modalBox">
        <h1>🐸 개구리 파리 잡기</h1>
        <p>각 스테이지마다 <strong>그 스테이지 안에서만 15점 이상</strong> 획득해야 다음 단계로 넘어간다.</p>
        <p>누적 점수와 별개다.</p>
        <p>화면을 터치해서 파리를 잡아라.</p>
        <div class="buttonRow">
          <button id="startBtn">게임 시작</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>
  </div>

  <script>
    (() => {
      "use strict";

      const gameArea = document.getElementById("gameArea");
      const overlay = document.getElementById("overlay");
      const modalBox = document.getElementById("modalBox");
      const toast = document.getElementById("toast");
      const tongue = document.getElementById("tongue");
      const frog = document.getElementById("frog");

      const stageChip = document.getElementById("stageChip");
      const needChip = document.getElementById("needChip");
      const stageScoreChip = document.getElementById("stageScoreChip");
      const totalScoreChip = document.getElementById("totalScoreChip");
      const timeChip = document.getElementById("timeChip");

      const startBtn = document.getElementById("startBtn");

      const TARGET_PER_STAGE = 15;
      const MAX_STAGE = 5;

      const STAGE_CONFIGS = [
        null,
        { duration: 20, maxFlies: 2, flySpeed: 0.9, spawnMs: 900 },
        { duration: 20, maxFlies: 3, flySpeed: 1.15, spawnMs: 800 },
        { duration: 18, maxFlies: 4, flySpeed: 1.35, spawnMs: 700 },
        { duration: 18, maxFlies: 5, flySpeed: 1.6, spawnMs: 620 },
        { duration: 16, maxFlies: 6, flySpeed: 1.9, spawnMs: 520 },
      ];

      const state = {
        started: false,
        running: false,
        stage: 1,
        stageScore: 0,
        totalScore: 0,
        timeLeft: 20,
        flies: [],
        flyIdSeq: 1,
        spawnTimer: null,
        gameTimer: null,
        animationFrame: null,
        audioStarted: false,
      };

      let audioCtx = null;
      let bgmOsc = null;
      let bgmGain = null;
      let bgmLfo = null;
      let bgmLfoGain = null;

      function showToast(msg, ms = 1400) {
        toast.textContent = msg;
        toast.style.opacity = "1";
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => {
          toast.style.opacity = "0";
        }, ms);
      }

      function updateHUD() {
        stageChip.textContent = `스테이지 ${state.stage}`;
        needChip.textContent = `목표 ${TARGET_PER_STAGE}점`;
        stageScoreChip.textContent = `현재 스테이지 ${state.stageScore}점`;
        totalScoreChip.textContent = `총점 ${state.totalScore}점`;
        timeChip.textContent = `남은 시간 ${state.timeLeft}초`;
      }

      function clearTimers() {
        if (state.spawnTimer) {
          clearInterval(state.spawnTimer);
          state.spawnTimer = null;
        }
        if (state.gameTimer) {
          clearInterval(state.gameTimer);
          state.gameTimer = null;
        }
        if (state.animationFrame) {
          cancelAnimationFrame(state.animationFrame);
          state.animationFrame = null;
        }
      }

      function clearFlies() {
        for (const fly of state.flies) {
          if (fly.el && fly.el.parentNode) fly.el.parentNode.removeChild(fly.el);
        }
        state.flies = [];
      }

      function resetStageValues() {
        state.stageScore = 0;
        state.timeLeft = STAGE_CONFIGS[state.stage].duration;
      }

      function ensureAudio() {
        if (!audioCtx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          audioCtx = new AC();
        }
        if (audioCtx.state === "suspended") {
          audioCtx.resume().catch(() => {});
        }
      }

      function startBGM() {
        ensureAudio();
        if (!audioCtx || state.audioStarted) return;

        bgmGain = audioCtx.createGain();
        bgmGain.gain.value = 0.018;
        bgmGain.connect(audioCtx.destination);

        bgmOsc = audioCtx.createOscillator();
        bgmOsc.type = "triangle";
        bgmOsc.frequency.value = 220;

        bgmLfo = audioCtx.createOscillator();
        bgmLfo.type = "sine";
        bgmLfo.frequency.value = 2.2;

        bgmLfoGain = audioCtx.createGain();
        bgmLfoGain.gain.value = 6;

        bgmLfo.connect(bgmLfoGain);
        bgmLfoGain.connect(bgmOsc.frequency);

        bgmOsc.connect(bgmGain);
        bgmOsc.start();
        bgmLfo.start();

        state.audioStarted = true;
      }

      function stopBGM() {
        try {
          if (bgmOsc) bgmOsc.stop();
          if (bgmLfo) bgmLfo.stop();
        } catch (_) {}
        bgmOsc = null;
        bgmLfo = null;
        bgmGain = null;
        bgmLfoGain = null;
        state.audioStarted = false;
      }

      function playTone(freq = 440, duration = 0.08, type = "sine", volume = 0.04) {
        ensureAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = volume;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.start(now);
        osc.stop(now + duration);
      }

      function playCatchSound() {
        playTone(780, 0.04, "square", 0.035);
        setTimeout(() => playTone(1040, 0.06, "square", 0.03), 30);
      }

      function playFailSound() {
        playTone(220, 0.18, "sawtooth", 0.04);
      }

      function playStageClearSound() {
        playTone(660, 0.08, "triangle", 0.04);
        setTimeout(() => playTone(880, 0.08, "triangle", 0.04), 90);
        setTimeout(() => playTone(1320, 0.12, "triangle", 0.04), 180);
      }

      function showModal(title, lines, buttons) {
        modalBox.innerHTML = `
          <h2>${title}</h2>
          ${lines.map(line => `<p>${line}</p>`).join("")}
          <div class="buttonRow">
            ${buttons.map((btn, idx) => `
              <button class="${btn.className || ""}" data-idx="${idx}">${btn.label}</button>
            `).join("")}
          </div>
        `;
        overlay.classList.remove("hidden");

        [...modalBox.querySelectorAll("button")].forEach(button => {
          button.addEventListener("click", () => {
            const idx = Number(button.dataset.idx);
            const handler = buttons[idx]?.onClick;
            if (typeof handler === "function") handler();
          });
        });
      }

      function hideModal() {
        overlay.classList.add("hidden");
      }

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function createFly() {
        if (!state.running) return;
        const cfg = STAGE_CONFIGS[state.stage];
        if (!cfg) return;
        if (state.flies.length >= cfg.maxFlies) return;

        const areaRect = gameArea.getBoundingClientRect();
        const size = 52;
        const fly = document.createElement("div");
        fly.className = "fly";
        fly.innerHTML = `
          <div class="wing left"></div>
          <div class="wing right"></div>
          <div class="body">🪰</div>
        `;

        const padding = 10;
        const minX = padding;
        const maxX = Math.max(padding, areaRect.width - size - padding);
        const minY = 80;
        const maxY = Math.max(minY + 10, areaRect.height - 240);

        const obj = {
          id: state.flyIdSeq++,
          el: fly,
          x: random(minX, maxX),
          y: random(minY, maxY),
          tx: random(minX, maxX),
          ty: random(minY, maxY),
          speed: cfg.flySpeed,
          caught: false
        };

        fly.style.left = `${obj.x}px`;
        fly.style.top = `${obj.y}px`;

        fly.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          catchFly(obj);
        });

        gameArea.appendChild(fly);
        state.flies.push(obj);
      }

      function catchFly(flyObj) {
        if (!state.running || flyObj.caught) return;
        flyObj.caught = true;

        animateTongueToFly(flyObj);

        playCatchSound();

        state.stageScore += 1;
        state.totalScore += 1;
        updateHUD();

        if (flyObj.el && flyObj.el.parentNode) {
          flyObj.el.parentNode.removeChild(flyObj.el);
        }
        state.flies = state.flies.filter(f => f.id !== flyObj.id);

        if (state.stageScore >= TARGET_PER_STAGE) {
          endStage(true);
        }
      }

      function animateTongueToFly(flyObj) {
        const flyRect = flyObj.el.getBoundingClientRect();
        const frogRect = frog.getBoundingClientRect();

        const startX = frogRect.left + frogRect.width / 2;
        const startY = frogRect.top + frogRect.height * 0.58;
        const endX = flyRect.left + flyRect.width / 2;
        const endY = flyRect.top + flyRect.height / 2;

        const dx = endX - startX;
        const dy = endY - startY;
        const length = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;

        const appRect = document.getElementById("app").getBoundingClientRect();
        tongue.style.left = `${startX - appRect.left}px`;
        tongue.style.bottom = `${appRect.bottom - startY}px`;
        tongue.style.height = `${length}px`;
        tongue.style.transform = `translateX(-50%) rotate(${angle}deg)`;
        tongue.style.opacity = "1";

        setTimeout(() => {
          tongue.style.opacity = "0";
          tongue.style.height = "0px";
        }, 110);
      }

      function moveFlies() {
        if (!state.running) return;

        const areaRect = gameArea.getBoundingClientRect();
        const size = 52;
        const minX = 6;
        const maxX = Math.max(6, areaRect.width - size - 6);
        const minY = 70;
        const maxY = Math.max(minY + 10, areaRect.height - 240);

        for (const fly of state.flies) {
          const dx = fly.tx - fly.x;
          const dy = fly.ty - fly.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 6) {
            fly.tx = random(minX, maxX);
            fly.ty = random(minY, maxY);
          } else {
            fly.x += (dx / dist) * fly.speed;
            fly.y += (dy / dist) * fly.speed;
          }

          if (fly.x < minX) fly.x = minX;
          if (fly.x > maxX) fly.x = maxX;
          if (fly.y < minY) fly.y = minY;
          if (fly.y > maxY) fly.y = maxY;

          fly.el.style.left = `${fly.x}px`;
          fly.el.style.top = `${fly.y}px`;
        }

        state.animationFrame = requestAnimationFrame(moveFlies);
      }

      function startStage() {
        clearTimers();
        clearFlies();

        resetStageValues();
        state.running = true;
        updateHUD();
        hideModal();

        const cfg = STAGE_CONFIGS[state.stage];
        if (!cfg) return;

        for (let i = 0; i < Math.min(2, cfg.maxFlies); i++) {
          createFly();
        }

        state.spawnTimer = setInterval(() => {
          if (!state.running) return;
          createFly();
        }, cfg.spawnMs);

        state.gameTimer = setInterval(() => {
          if (!state.running) return;
          state.timeLeft -= 1;
          updateHUD();

          if (state.timeLeft <= 0) {
            endStage(state.stageScore >= TARGET_PER_STAGE);
          }
        }, 1000);

        moveFlies();
      }

      function endStage(cleared) {
        if (!state.running) return;
        state.running = false;
        clearTimers();
        clearFlies();

        if (cleared) {
          playStageClearSound();

          if (state.stage >= MAX_STAGE) {
            showModal(
              "🏆 게임 클리어",
              [
                `모든 스테이지를 통과했다.`,
                `최종 총점: <strong>${state.totalScore}점</strong>`
              ],
              [
                {
                  label: "처음부터 다시",
                  onClick: () => resetGame()
                }
              ]
            );
            return;
          }

          const nextStage = state.stage + 1;
          showModal(
            "✅ 스테이지 클리어",
            [
              `스테이지 ${state.stage}에서 <strong>${state.stageScore}점</strong> 획득했다.`,
              `다음 스테이지 ${nextStage}로 이동한다.`
            ],
            [
              {
                label: "다음 스테이지",
                onClick: () => {
                  state.stage = nextStage;
                  startStage();
                }
              },
              {
                label: "게임 종료",
                className: "danger",
                onClick: () => quitGame()
              }
            ]
          );
        } else {
          playFailSound();
          showModal(
            "❌ 게임 오버",
            [
              `스테이지 ${state.stage}에서 목표 점수에 도달하지 못했다.`,
              `이번 스테이지 점수: <strong>${state.stageScore}점</strong> / 목표 ${TARGET_PER_STAGE}점`,
              `총점: <strong>${state.totalScore}점</strong>`
            ],
            [
              {
                label: "다시 시작",
                onClick: () => resetGame()
              },
              {
                label: "게임 종료",
                className: "danger",
                onClick: () => quitGame()
              }
            ]
          );
        }
      }

      function quitGame() {
        state.running = false;
        clearTimers();
        clearFlies();
        stopBGM();

        showModal(
          "🛑 게임 종료",
          [
            `게임이 종료되었다.`,
            `마지막 총점: <strong>${state.totalScore}점</strong>`
          ],
          [
            {
              label: "처음부터 시작",
              onClick: () => resetGame()
            }
          ]
        );
      }

      function resetGame() {
        clearTimers();
        clearFlies();

        state.started = true;
        state.running = false;
        state.stage = 1;
        state.stageScore = 0;
        state.totalScore = 0;
        state.timeLeft = STAGE_CONFIGS[1].duration;

        updateHUD();
        startBGM();
        startStage();
      }

      function forceSpawnIfEmpty() {
        if (!state.running) return;
        if (state.flies.length === 0) {
          createFly();
        }
      }

      startBtn.addEventListener("click", () => {
        ensureAudio();
        startBGM();
        resetGame();
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          if (state.running) {
            state.running = false;
            clearTimers();
            showModal(
              "⏸ 일시정지",
              [
                `화면이 전환되어 게임이 일시정지되었다.`,
                `이어하려면 계속 버튼을 눌러라.`
              ],
              [
                {
                  label: "계속",
                  onClick: () => {
                    state.running = true;

                    const cfg = STAGE_CONFIGS[state.stage];
                    state.spawnTimer = setInterval(() => {
                      if (!state.running) return;
                      createFly();
                    }, cfg.spawnMs);

                    state.gameTimer = setInterval(() => {
                      if (!state.running) return;
                      state.timeLeft -= 1;
                      updateHUD();
                      if (state.timeLeft <= 0) {
                        endStage(state.stageScore >= TARGET_PER_STAGE);
                      }
                    }, 1000);

                    moveFlies();
                    hideModal();
                  }
                },
                {
                  label: "게임 종료",
                  className: "danger",
                  onClick: () => quitGame()
                }
              ]
            );
          }
        } else {
          ensureAudio();
        }
      });

      window.addEventListener("resize", () => {
        forceSpawnIfEmpty();
      });

      setInterval(() => {
        forceSpawnIfEmpty();
      }, 600);

      updateHUD();

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch((err) => {
            console.error("Service Worker 등록 실패:", err);
          });
        });
      }

      let deferredPrompt = null;

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        showToast("홈 화면에 추가할 수 있다.");
      });

      window.installFrogGame = async function () {
        if (!deferredPrompt) {
          showToast("브라우저 메뉴에서 홈 화면에 추가를 눌러라.");
          return;
        }
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
      };
    })();
  </script>
</body>
</html>
